name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Validate HTML and Deploy to GitHub Pages
  validate-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Validate HTML
      run: |
        echo "✅ Validating index.html..."
        if [ -f "index.html" ]; then
          echo "✅ index.html exists"
          # Check if file is not empty
          if [ -s "index.html" ]; then
            echo "✅ index.html is not empty"
          else
            echo "❌ index.html is empty"
            exit 1
          fi
        else
          echo "❌ index.html not found"
          exit 1
        fi
    
    - name: Check for broken links (optional)
      run: |
        echo "✅ Checking for common issues..."
        # Check if GitHub repo link is present
        if grep -q "github.com/Crusherbolt/ewigen" index.html; then
          echo "✅ GitHub repository link found"
        else
          echo "⚠️  Warning: GitHub repository link not found"
        fi
    
    - name: Setup Pages
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/configure-pages@v3
    
    - name: Upload artifact
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-pages-artifact@v2
      with:
        path: '.'
    
    - name: Deploy to GitHub Pages
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      id: deployment
      uses: actions/deploy-pages@v2
    
    - name: Summary
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ **Status**: Deployed successfully" >> $GITHUB_STEP_SUMMARY
        echo "🌐 **URL**: https://crusherbolt.github.io/ewigen/" >> $GITHUB_STEP_SUMMARY
        echo "📦 **Branch**: main" >> $GITHUB_STEP_SUMMARY
        echo "🕐 **Time**: $(date)" >> $GITHUB_STEP_SUMMARY

  # Optional: Validate Python code structure (non-blocking)
  validate-python:
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Check Python files
      run: |
        echo "✅ Checking Python code structure..."
        if [ -d "backend" ] || [ -d "ml" ]; then
          echo "✅ Python directories found"
          # Basic syntax check
          find . -name "*.py" -type f -exec python -m py_compile {} \; 2>&1 | head -20 || true
        else
          echo "ℹ️  No Python directories found (optional)"
        fi

  # Optional: Validate documentation
  validate-docs:
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Check documentation
      run: |
        echo "✅ Checking documentation files..."
        if [ -f "README.md" ]; then
          echo "✅ README.md exists"
          wc -l README.md
        fi
        
        if [ -f "ARCHITECTURE.md" ]; then
          echo "✅ ARCHITECTURE.md exists"
        fi
        
        echo "ℹ️  Documentation validation complete"

# Made with Bob - Simplified CI/CD for GitHub Pages
